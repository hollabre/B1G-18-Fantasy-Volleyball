<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Ten Fantasy Volleyball 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c12;--surface:#0d1520;--surface2:#131e2e;--border:#1a2d45;
  --accent:#4db8f0;--accent2:#2de6b8;--accent3:#f04f3a;
  --text:#e4f0ff;--muted:#6a9cbd;--gold:#f0c040;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
/* volleyball court lines background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    linear-gradient(90deg,transparent calc(50% - 1px),rgba(77,184,240,0.12) calc(50% - 1px),rgba(77,184,240,0.12) calc(50% + 1px),transparent calc(50% + 1px)),
    linear-gradient(90deg,transparent calc(33% - 1px),rgba(77,184,240,0.05) calc(33%),rgba(77,184,240,0.05) calc(33% + 1px),transparent calc(33% + 1px)),
    linear-gradient(90deg,transparent calc(67% - 1px),rgba(77,184,240,0.05) calc(67%),rgba(77,184,240,0.05) calc(67% + 1px),transparent calc(67% + 1px)),
    linear-gradient(0deg,transparent calc(8% - 1px),rgba(77,184,240,0.07) calc(8%),rgba(77,184,240,0.07) calc(8% + 1px),transparent calc(8% + 1px)),
    linear-gradient(0deg,transparent calc(92% - 1px),rgba(77,184,240,0.07) calc(92%),rgba(77,184,240,0.07) calc(92% + 1px),transparent calc(92% + 1px)),
    linear-gradient(rgba(77,184,240,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(77,184,240,0.02) 1px,transparent 1px),
    var(--bg);
  background-size:100% 100%,100% 100%,100% 100%,100% 100%,100% 100%,52px 52px,52px 52px,100%;
}
/* glow orb */
body::after{content:'';position:fixed;right:-140px;top:50%;transform:translateY(-50%);width:520px;height:520px;pointer-events:none;z-index:0;opacity:0.03;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);border-radius:50%;}

/* HEADER */
header{z-index:10;padding:0 2rem;border-bottom:2px solid var(--border);background:linear-gradient(135deg,rgba(8,12,18,0.98),rgba(13,21,32,0.98));backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:space-between;height:76px;position:sticky;top:0;box-shadow:0 2px 24px rgba(0,0,0,0.5);}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),var(--accent),transparent);opacity:0.5;}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:0.06em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.logo-sub{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:0.1rem;}
.header-meta{display:flex;align-items:center;gap:1.5rem;}
.season-badge{font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:0.12em;color:var(--accent);border:1px solid rgba(77,184,240,0.4);padding:0.3rem 0.85rem;background:rgba(77,184,240,0.06);clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);}
.week-label{font-size:0.8rem;color:var(--muted);}

/* TABS */
nav.tabs{position:sticky;top:76px;z-index:9;display:flex;padding:0 2rem;background:linear-gradient(180deg,var(--surface),rgba(13,21,32,0.96));border-bottom:1px solid var(--border);overflow-x:auto;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
nav.tabs button{background:none;border:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;padding:1.1rem 1.6rem;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color 0.2s;position:relative;}
nav.tabs button::after{content:'';position:absolute;bottom:-3px;left:50%;right:50%;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:left 0.25s,right 0.25s;border-radius:2px 2px 0 0;}
nav.tabs button:hover{color:var(--text);}
nav.tabs button.active{color:var(--accent);}
nav.tabs button.active::after{left:0;right:0;}

/* MAIN */
main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:1.5rem 2rem 4rem;}
.section{display:none;}
.section.active{display:block;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* SEC HEADER */
.sec-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:1rem;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;letter-spacing:0.05em;line-height:1;text-shadow:0 0 40px rgba(77,184,240,0.15);}
.sec-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sec-desc{font-size:0.82rem;color:var(--muted);margin-top:0.3rem;font-style:italic;}

/* TEAMS */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem;}
.team-card{background:linear-gradient(160deg,var(--surface),var(--surface2));border:1px solid var(--border);overflow:hidden;transition:border-color 0.25s,box-shadow 0.25s,transform 0.2s;position:relative;}
.team-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(77,184,240,0.025),transparent 60%);pointer-events:none;}
.team-card:hover{border-color:rgba(77,184,240,0.5);box-shadow:0 8px 32px rgba(77,184,240,0.1),0 2px 8px rgba(0,0,0,0.4);transform:translateY(-2px);}
.tc-stripe{height:4px;background:linear-gradient(90deg,var(--tc-color,var(--accent)),transparent);}
.tc-top{display:flex;}
.tc-photo{width:110px;min-width:110px;height:110px;background:linear-gradient(135deg,var(--surface2),#0a1422);display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border);flex-shrink:0;overflow:hidden;}
.tc-photo img{width:100%;height:100%;object-fit:cover;}
.tc-photo-icon{font-size:1.8rem;opacity:0.2;}
.tc-photo-label{font-family:'Space Mono',monospace;font-size:0.43rem;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;margin-top:0.3rem;text-align:center;padding:0 0.3rem;line-height:1.4;}
.tc-info{padding:0.85rem 1rem;flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.tc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;}
.tc-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.05em;line-height:1.15;}
.tc-owner{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.09em;margin-top:0.1rem;}
.tc-rank{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:rgba(77,184,240,0.1);line-height:1;flex-shrink:0;}
.tc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-top:0.7rem;}
.stat-box{background:rgba(0,0,0,0.25);border:1px solid var(--border);padding:0.5rem 0.3rem;text-align:center;transition:border-color 0.2s,background 0.2s;}
.stat-box:hover{border-color:rgba(77,184,240,0.3);background:rgba(77,184,240,0.05);}
.stat-val{font-family:'Space Mono',monospace;font-size:0.88rem;font-weight:700;}
.stat-lbl{font-size:0.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:0.1rem;}

/* ROSTER EXPAND */
.roster-toggle{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem;background:rgba(0,0,0,0.2);border-top:1px solid var(--border);cursor:pointer;font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);transition:color 0.2s,background 0.2s;user-select:none;}
.roster-toggle:hover{color:var(--accent);background:rgba(77,184,240,0.06);}
.toggle-arrow{transition:transform 0.25s;display:inline-block;}
.roster-toggle.open .toggle-arrow{transform:rotate(180deg);}
.roster-panel{max-height:0;overflow:hidden;transition:max-height 0.35s ease;}
.roster-panel.open{max-height:700px;border-top:1px solid var(--border);}
.rtable{width:100%;border-collapse:collapse;font-size:0.78rem;}
.rtable thead tr{background:rgba(0,0,0,0.3);}
.rtable thead th{font-family:'Space Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:0.5rem 0.75rem;text-align:left;}
.rtable tbody tr{border-bottom:1px solid rgba(26,45,69,0.5);}
.rtable tbody tr:last-child{border-bottom:none;}
.rtable tbody tr:hover{background:rgba(77,184,240,0.04);}
.rtable td{padding:0.5rem 0.75rem;}
.rtable td.rpts{font-family:'Space Mono',monospace;color:var(--accent);font-weight:700;text-align:right;}
.rtable td.rname{font-weight:600;}
.rtable td.rschool{color:var(--muted);font-size:0.7rem;}

/* SCORES */
.matchups{display:flex;flex-direction:column;gap:1rem;}
.wk-hdr{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--accent);letter-spacing:0.18em;text-transform:uppercase;padding:0.6rem 0;border-bottom:1px solid var(--border);margin-bottom:0.75rem;margin-top:1.5rem;display:flex;align-items:center;gap:0.75rem;}
.wk-hdr::before{content:'';display:inline-block;width:4px;height:14px;background:var(--accent);border-radius:2px;}
.wk-hdr:first-child{margin-top:0;}
.mc{background:linear-gradient(160deg,var(--surface),var(--surface2));border:1px solid var(--border);padding:1.25rem 1.5rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;transition:border-color 0.2s,box-shadow 0.2s;position:relative;overflow:hidden;}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(77,184,240,0.15),transparent);}
.mc:hover{border-color:rgba(77,184,240,0.35);box-shadow:0 4px 20px rgba(77,184,240,0.06);}
.mt{display:flex;flex-direction:column;gap:0.15rem;}
.mt.r{text-align:right;}
.mtn{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.04em;}
.mto{font-size:0.66rem;color:var(--muted);}
.msb{display:flex;align-items:center;gap:0.75rem;justify-content:center;}
.ms{font-family:'Space Mono',monospace;font-size:1.75rem;font-weight:700;min-width:3.2rem;text-align:center;}
.ms.win{color:var(--accent);text-shadow:0 0 20px rgba(77,184,240,0.35);}
.ms.lose{color:var(--muted);}
.msep{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--border);}
.live-dot{display:inline-block;width:6px;height:6px;background:var(--accent2);border-radius:50%;margin-right:4px;animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* TABLES */
.swrap{overflow-x:auto;}
table.stbl{width:100%;border-collapse:collapse;font-size:0.875rem;}
table.stbl thead tr{background:linear-gradient(90deg,var(--surface2),rgba(13,21,32,0.8));border-bottom:2px solid var(--accent);}
table.stbl thead th{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);padding:0.9rem 1rem;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;transition:color 0.15s;}
table.stbl thead th:hover{color:var(--accent);}
table.stbl thead th.sorted{color:var(--accent);}
table.stbl thead th .si{margin-left:0.3rem;opacity:0.4;}
table.stbl thead th.sorted .si{opacity:1;}
table.stbl tbody tr{border-bottom:1px solid rgba(26,45,69,0.7);transition:background 0.15s;}
table.stbl tbody tr:hover{background:rgba(77,184,240,0.04);}
table.stbl tbody td{padding:0.85rem 1rem;white-space:nowrap;}
td.rc{font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--muted);width:36px;text-align:center;}
td.rc.t3{color:var(--gold);font-weight:700;}
td.nc{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:0.04em;}
td.oc{font-size:0.74rem;color:var(--muted);}
td.nm{font-family:'Space Mono',monospace;text-align:right;padding-right:1rem;}
table.stbl thead th[style*="text-align:right"]{padding-right:1rem;}
td.wc{color:var(--accent2);font-weight:600;text-align:right;}
td.lc{color:var(--accent3);text-align:right;}
td.pc{color:var(--accent);font-weight:700;text-align:right;}
.rbar{display:flex;width:72px;height:4px;background:rgba(26,45,69,0.8);overflow:hidden;border-radius:2px;}
.rbar-f{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:2px;}

/* PLAYERS */
.ctrl{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
.sbox{background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:0.7rem;padding:0.65rem 1rem;outline:none;width:210px;transition:border-color 0.2s,box-shadow 0.2s;}
.sbox:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(77,184,240,0.1);}
.sbox::placeholder{color:var(--muted);}
.fsel{background:#0d1520;border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:0.68rem;padding:0.65rem 1rem;outline:none;cursor:pointer;transition:border-color 0.2s;} .fsel option{background:#0d1520;color:var(--text);}
.fsel:focus{border-color:var(--accent);}

/* POS BADGES */
.pb{display:inline-block;font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;padding:0.18rem 0.45rem;border-radius:3px;font-weight:700;}
.pb-S{background:rgba(45,230,184,0.15);color:var(--accent2);border:1px solid rgba(45,230,184,0.2);}
.pb-OH{background:rgba(77,184,240,0.15);color:var(--accent);border:1px solid rgba(77,184,240,0.2);}
.pb-MB{background:rgba(240,79,58,0.12);color:var(--accent3);border:1px solid rgba(240,79,58,0.2);}
.pb-L{background:rgba(77,184,240,0.08);color:#8cc8e8;border:1px solid rgba(77,184,240,0.15);}
.pb-OPP{background:rgba(180,140,255,0.12);color:#c0a0ff;border:1px solid rgba(180,140,255,0.2);}
.tu{color:var(--accent2);}
.td2{color:var(--accent3);}
.tf{color:var(--muted);}

/* FA BADGE */
.fa-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;padding:0.18rem 0.45rem;border-radius:3px;background:rgba(45,230,184,0.12);color:var(--accent2);border:1px solid rgba(45,230,184,0.3);font-weight:700;white-space:nowrap;}

/* DRAFT */
.dgwrap{overflow-x:auto;}
.dg{border:1px solid var(--border);overflow:hidden;}
.dhr{display:grid;background:linear-gradient(90deg,var(--surface2),rgba(13,21,32,0.9));border-bottom:2px solid var(--accent);}
.dhc{font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);padding:0.65rem 0.35rem;text-align:center;border-right:1px solid var(--border);line-height:1.4;}
.dhc:last-child{border-right:none;}
.drr{display:grid;border-bottom:1px solid rgba(26,45,69,0.6);}
.drr:last-child{border-bottom:none;}
.drl{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;color:var(--muted);display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);}
.dp{padding:0.45rem 0.35rem;border-right:1px solid rgba(26,45,69,0.5);min-height:62px;display:flex;flex-direction:column;justify-content:center;gap:0.12rem;position:relative;transition:background 0.15s;}
.dp:hover{background:rgba(77,184,240,0.06);}
.dp:last-child{border-right:none;}
.dp.ss{background:rgba(0,0,0,0.12);}
.dp-name{font-size:0.7rem;font-weight:600;color:var(--text);line-height:1.2;}
.dp-school{font-size:0.56rem;color:var(--muted);}
.dp-num{font-family:'Space Mono',monospace;font-size:0.48rem;color:rgba(77,184,240,0.2);position:absolute;top:3px;right:3px;}

/* SCORES PAGE */
.week-nav{display:flex;align-items:center;gap:0.6rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.week-nav-label{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;}
.week-nav-btn{background:rgba(0,0,0,0.25);border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;padding:0.45rem 0.9rem;cursor:pointer;transition:all 0.15s;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
.week-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.week-nav-btn.active{background:rgba(77,184,240,0.12);border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px rgba(77,184,240,0.15);}
.matchup-expanded{background:linear-gradient(160deg,var(--surface),var(--surface2));border:1px solid var(--border);margin-bottom:1rem;overflow:hidden;transition:border-color 0.2s;}
.matchup-expanded:hover{border-color:rgba(77,184,240,0.3);}
.me-header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:1rem 1.25rem;gap:1rem;border-bottom:1px solid var(--border);}
.me-team{display:flex;align-items:center;gap:0.75rem;}
.me-team.r{text-align:right;flex-direction:row-reverse;}
.me-team.r{text-align:right;}
.me-tname{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.04em;}
.me-owner{font-size:0.66rem;color:var(--muted);}
.me-scores{display:flex;align-items:center;gap:0.75rem;justify-content:center;}
.me-score{font-family:'Space Mono',monospace;font-size:1.75rem;font-weight:700;min-width:3rem;text-align:center;}
.me-score.win{color:var(--accent);text-shadow:0 0 20px rgba(77,184,240,0.35);}
.me-score.lose{color:var(--muted);}
.me-sep{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--border);}
.me-lineups{display:grid;grid-template-columns:1fr 1fr;}
.me-lineup{padding:0.75rem 1rem;}
.me-lineup:first-child{border-right:1px solid var(--border);}
.me-lineup-title{font-family:'Space Mono',monospace;font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.5rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border);}
.me-player-row{display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0;border-bottom:1px solid rgba(26,45,69,0.4);}
.me-player-row:last-child{border-bottom:none;}
.me-slot{font-family:'Space Mono',monospace;font-size:0.52rem;color:var(--muted);min-width:36px;text-transform:uppercase;}
.me-pname{flex:1;font-size:0.8rem;font-weight:600;}
.me-ppts{font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--accent);font-weight:700;text-align:right;min-width:36px;}
.me-bench-divider{font-family:'Space Mono',monospace;font-size:0.5rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;padding:0.4rem 0 0.2rem;opacity:0.5;}
.me-player-row.bench{opacity:0.55;}
.expand-toggle{display:flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.5rem;background:rgba(0,0,0,0.2);cursor:pointer;font-family:'Space Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;transition:color 0.2s,background 0.2s;user-select:none;border-top:1px solid var(--border);}
.expand-toggle:hover{color:var(--accent);background:rgba(77,184,240,0.05);}
.expand-toggle .earrow{transition:transform 0.25s;display:inline-block;}
.expand-toggle.open .earrow{transform:rotate(180deg);}
.lineup-panel{max-height:0;overflow:hidden;transition:max-height 0.4s ease;}
.lineup-panel.open{max-height:1400px;}

/* PLAYOFFS */
.pdivider{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--accent);letter-spacing:0.16em;text-transform:uppercase;padding-bottom:0.6rem;margin:2rem 0 1.25rem;display:flex;align-items:center;gap:0.75rem;}
.pdivider::before{content:'';display:inline-block;width:4px;height:14px;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:2px;}
.pdivider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.pdivider:first-child{margin-top:0;}
.bracket-outer{overflow-x:auto;padding-bottom:0.5rem;}
.bracket-layout{display:flex;gap:0.5rem;min-width:600px;flex-wrap:wrap;}

<body>

<main>
  <section id="teams"     class="section active"></section>
  <section id="scores"    class="section"></section>
  <section id="standings" class="section"></section>
  <section id="players"   class="section"></section>
  <section id="draft"     class="section"></section>
  <section id="playoffs"  class="section"></section>
</main>

<script>
// ═══════════════════════════════════════════════════════════════
//  GOOGLE SHEETS CONFIGURATION
//  1. Create a Google Sheet with the tabs listed below
//  2. Publish it: File → Share → Publish to web → Entire Document → CSV → Publish
//  3. For each sheet tab, get the URL and paste the SHEET_ID and GID values below
//  4. The SHEET_ID is the long string in your sheet URL between /d/ and /edit
//  5. The GID is the number after #gid= in the URL for each tab
//
//  Required tabs in your Google Sheet:
//    • Teams      (columns: id, name, owner, color, photo, wins, losses, pf, pa, streak)
//    • Players    (columns: name, school, pos, fantasyTeam, fa, slot, photo, pts, lastWk, sets, hitPct, kills, aces, assists, digs, blocks)
//    • Matchups   (columns: week, home, away, homeScore, awayScore)
//    • Lineups    (columns: week, gameIndex, side, slot, playerName)
//    • Playoff    (columns: round, label, seedA, teamA, scoreA, seedB, teamB, scoreB, winner)
//    • Draft      (columns: round, slot, teamId, playerName, school, pos)
// ═══════════════════════════════════════════════════════════════

const SHEET_ID = '1vji_YICqPCQ7OOTdmcTdr40_2YKgk6hA7S6SqUH5bpw';  // <-- paste your Google Sheet ID here

const SHEET_GIDS = {
  teams:    '0',        // <-- replace with GID for your Teams tab
  players:  '991574399',  // <-- replace with GID for your Players tab
  matchups: '375128671',  // <-- replace with GID for your Matchups tab
  lineups:  '1674016992',  // <-- replace with GID for your Lineups tab
  playoff:  '991284458',  // <-- replace with GID for your Playoff tab
  draft:    '2009060021',  // <-- replace with GID for your Draft tab
};

// ── Fetch a single sheet tab as parsed rows ──────────────────────
async function fetchSheet(tabKey) {
  const gid = SHEET_GIDS[tabKey];
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`Failed to fetch ${tabKey}: ${res.status}`);
  const text = await res.text();
  return parseCSV(text);
}

// ── Simple CSV parser (handles quoted fields with commas) ─────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj  = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  }).filter(row => Object.values(row).some(v => v !== ''));
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

// ── Number / bool helpers ─────────────────────────────────────────
const num  = v => parseFloat(v) || 0;
const bool = v => v === 'TRUE' || v === 'true' || v === '1';

// ═══════════════════════════════════════════════════════════════
//  DATA — populated from Google Sheets at load time
//  These start empty and get filled by loadAllData()
// ═══════════════════════════════════════════════════════════════
let TEAMS    = [];
let PLAYERS  = [];
let MATCHUPS = [];
let DRAFT_PICKS = [];
let PLAYOFF  = { qf:[], sf:[], final:{} };

// ── Transform raw sheet rows into app data ─────────────────────

function buildTeams(rows) {
  return rows.map(r => ({
    id:      num(r.id),
    name:    r.name,
    owner:   r.owner,
    color:   r.color || '#60c8f5',
    photo:   r.photo || null,
    wins:    num(r.wins),
    losses:  num(r.losses),
    pf:      num(r.pf),
    pa:      num(r.pa),
    streak:  num(r.streak),
  }));
}

function buildPlayers(rows) {
  return rows.map(r => ({
    name:     r.name,
    school:   r.school,
    pos:      r.pos,
    ft:       num(r.fantasyTeam),
    fa:       bool(r.fa),
    slot:     r.slot || null,
    photo:    r.photo || null,
    pts:      num(r.pts),
    lastWk:   num(r.lastWk),
    sets:     num(r.sets),
    hitPct:   r.hitPct || '.000',
    kills:    num(r.kills),
    aces:     num(r.aces),
    assists:  num(r.assists),
    digs:     num(r.digs),
    blocks:   num(r.blocks),
  }));
}

function buildMatchups(rows, lineupRows) {
  // Group by week
  const weeks = {};
  rows.forEach(r => {
    const wk = r.week;
    if (!weeks[wk]) weeks[wk] = { week: wk, games: [] };
    weeks[wk].games.push({
      home:       num(r.home),
      away:       num(r.away),
      homeScore:  num(r.homeScore),
      awayScore:  num(r.awayScore),
      homeLineup: [],
      awayLineup: [],
      playerScores: {},
    });
  });

  // Attach lineups
  lineupRows.forEach(r => {
    const wk  = r.week;
    const gi  = num(r.gameIndex);
    const side = r.side; // 'home' or 'away'
    if (!weeks[wk] || !weeks[wk].games[gi]) return;
    const game = weeks[wk].games[gi];
    const SLOT_ORDER = ['OH1','OH2','MB1','MB2','S','L','FLEX','BN1','BN2','BN3'];
    const idx  = SLOT_ORDER.indexOf(r.slot);
    if (side === 'home') game.homeLineup[idx < 0 ? game.homeLineup.length : idx] = r.playerName;
    else                 game.awayLineup[idx < 0 ? game.awayLineup.length : idx] = r.playerName;
    if (r.score) game.playerScores[r.playerName] = num(r.score);
  });

  // Sort weeks newest first (current week first)
  return Object.values(weeks).sort((a, b) => {
    const na = parseInt(a.week.replace(/\D/g,'')) || 0;
    const nb = parseInt(b.week.replace(/\D/g,'')) || 0;
    return na - nb;
  });
}

function buildDraft(rows) {
  return rows.map(r => ({
    r: num(r.round),
    s: num(r.slot),
    t: num(r.teamId),
    name:   r.playerName,
    school: r.school,
    pos:    r.pos,
  }));
}

function buildPlayoff(rows) {
  const qf = [], sf = [];
  let final = { teamA: null, teamB: null, winner: null };

  rows.forEach(r => {
    const entry = {
      label:  r.label,
      teamA:  r.teamA ? { seed: num(r.seedA), tid: num(r.teamA), score: num(r.scoreA) } : null,
      teamB:  r.teamB ? { seed: num(r.seedB), tid: num(r.teamB), score: num(r.scoreB) } : null,
      winner: r.winner ? num(r.winner) : null,
    };
    if (r.round === 'qf')    qf.push(entry);
    else if (r.round === 'sf')    sf.push(entry);
    else if (r.round === 'final') final = entry;
  });

  return { qf, sf, final };
}

// ── Load everything and render ────────────────────────────────────
async function loadAllData() {
  showLoadingState();
  try {
    const [teamRows, playerRows, matchupRows, lineupRows, playoffRows, draftRows] =
      await Promise.all([
        fetchSheet('teams'),
        fetchSheet('players'),
        fetchSheet('matchups'),
        fetchSheet('lineups'),
        fetchSheet('playoff'),
        fetchSheet('draft'),
      ]);

    TEAMS       = buildTeams(teamRows);
    PLAYERS     = buildPlayers(playerRows);
    MATCHUPS    = buildMatchups(matchupRows, lineupRows);
    DRAFT_PICKS = buildDraft(draftRows);
    PLAYOFF     = buildPlayoff(playoffRows);

    renderAll();
    hideLoadingState();
  } catch (err) {
    showError(err);
  }
}

function showLoadingState() {
  document.querySelectorAll('.section').forEach(s => {
    s.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;gap:1rem">'
      + '<div class="loader"></div>'
      + '<div style="font-family:Space Mono,monospace;font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase">Loading from Google Sheets...</div>'
      + '</div>';
  });
}

function hideLoadingState() {}

function showError(err) {
  document.querySelectorAll('.section').forEach(s => {
    s.innerHTML = '<div style="padding:2rem;font-family:Space Mono,monospace;font-size:0.75rem;color:var(--accent3)">'
      + '<div style="font-size:1rem;margin-bottom:0.75rem">&#9888; Could not load data from Google Sheets</div>'
      + '<div style="color:var(--muted);margin-bottom:1rem">' + err.message + '</div>'
      + '<div style="color:var(--muted);line-height:1.8">'
      + '1. Make sure SHEET_ID and SHEET_GIDS are filled in correctly<br>'
      + '2. Make sure the sheet is published: <b style="color:var(--text)">File &rarr; Share &rarr; Publish to web &rarr; Entire Document &rarr; CSV</b><br>'
      + '3. Check that your sheet tab names match the GIDs above'
      + '</div>'
      + '</div>';
  });
}

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
const gt  = id => TEAMS.find(t => t.id === id);
const SH  = '<span class="si">';
const SE  = '</span>';
const SLOT_ORDER  = ['OH1','OH2','MB1','MB2','S','L','FLEX','BN1','BN2','BN3'];
const SLOT_LABELS = { OH1:'OH', OH2:'OH', MB1:'MB', MB2:'MB', S:'S', L:'L', FLEX:'FLEX', BN1:'BN', BN2:'BN', BN3:'BN' };
const BENCH_SLOTS = ['BN1','BN2','BN3'];

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function toggleRoster(tid) {
  const panel  = document.getElementById('rp' + tid);
  const toggle = document.getElementById('rt' + tid);
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

function toggleLineup(id) {
  const panel  = document.getElementById('lp' + id);
  const toggle = document.getElementById('lt' + id);
  if (!panel) return;
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

function togglePlayerRow(rowId) {
  const row   = document.getElementById(rowId);
  const arrow = document.getElementById('arr-' + rowId);
  if (!row) return;
  const isOpen = row.style.display !== 'none';
  row.style.display = isOpen ? 'none' : 'table-row';
  if (arrow) arrow.innerHTML = isOpen ? '&#9660;' : '&#9650;';
}

function pb(pos) { return '<span class="pb pb-' + pos + '">' + pos + '</span>'; }
function strkStr(s) { return s===0?'&mdash;':(s>0?'W':'L')+Math.abs(s); }
function strkCol(s) { return s>0?'var(--accent2)':s<0?'var(--accent3)':'var(--muted)'; }
function pct(w,l)   { return (w+l)===0?'&mdash;':(w/(w+l)*100).toFixed(1)+'%'; }
function fillPct(w,l){ return (w+l)===0?0:(w/(w+l)*100).toFixed(0); }
function faBadge()  { return '<span class="fa-badge">FA</span>'; }
function initials(name){ return name.replace(/[()]/g,'').split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }

function teamLogoCell(t) {
  if (!t) return '';
  const style = 'width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:Bebas Neue,sans-serif;font-size:0.7rem;letter-spacing:0.04em;overflow:hidden;border:2px solid '+t.color+'44;background:'+t.color+'18;color:'+t.color+';';
  if (t.photo) return '<div style="'+style+'"><img src="'+t.photo+'" style="width:100%;height:100%;object-fit:cover" alt=""></div>';
  return '<div style="'+style+'">'+initials(t.name)+'</div>';
}

function playerPhotoCell(p) {
  const style = 'width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:Space Mono,monospace;font-size:0.55rem;overflow:hidden;border:1px solid var(--border);background:var(--surface2);color:var(--muted);';
  if (p.photo) return '<div style="'+style+'"><img src="'+p.photo+'" style="width:100%;height:100%;object-fit:cover" alt=""></div>';
  const ini = p.name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
  return '<div style="'+style+'">'+ini+'</div>';
}

// ═══════════════════════════════════════════════════════════════
//  TEAMS TAB
// ═══════════════════════════════════════════════════════════════
function renderTeams() {
  const sorted = [...TEAMS].sort((a,b)=>b.wins-a.wins||(b.pf-b.pa)-(a.pf-a.pa));
  let html = '<div class="sec-header"><div><div class="sec-title">THE <span>TEAMS</span></div>'
           + '<div class="sec-desc">'+TEAMS.length+' teams &middot; 2026 Season &middot; Click "View Roster" to expand</div></div></div>'
           + '<div class="teams-grid">';
  sorted.forEach((t,i) => {
    const roster = PLAYERS.filter(p=>p.ft===t.id).sort((a,b)=>SLOT_ORDER.indexOf(a.slot)-SLOT_ORDER.indexOf(b.slot));
    const diff   = t.pf - t.pa;
    const photo  = t.photo
      ? '<img src="'+t.photo+'" alt="'+t.name+'">'
      : '<div class="tc-photo-icon">&#128248;</div><div class="tc-photo-label">Add Team Photo</div>';
    const rows = roster.map(p => {
      const isBench = BENCH_SLOTS.includes(p.slot);
      return '<tr'+(isBench?' style="opacity:0.65"':'')+'>'
        +'<td style="font-family:Space Mono,monospace;font-size:0.55rem;color:var(--muted);padding:0.5rem 0.75rem;white-space:nowrap">'+(isBench?'BENCH':SLOT_LABELS[p.slot]||p.slot)+'</td>'
        +'<td class="rname">'+p.name+'</td><td class="rschool">'+p.school+'</td>'
        +'<td>'+pb(p.pos)+'</td><td class="rpts">'+p.pts.toFixed(1)+'</td></tr>';
    }).join('');
    html += '<div class="team-card">'

// ═══════════════════════════════════════════════════════════════
let scoresWeekIdx = 0;

function renderScores() {
  const totalWeeks = MATCHUPS.length;
  if (totalWeeks === 0) {
    document.getElementById('scores').innerHTML = '<div class="sec-header"><div><div class="sec-title">MATCH<span>UPS</span></div></div></div><div style="padding:2rem;font-family:Space Mono,monospace;font-size:0.75rem;color:var(--muted)">No matchup data yet.</div>';
    return;
  }
  scoresWeekIdx = Math.min(scoresWeekIdx, totalWeeks - 1);

  let navHtml = '<div class="week-nav"><span class="week-nav-label">Jump to week:</span>';
  MATCHUPS.forEach((wk, idx) => {
    navHtml += '<button class="week-nav-btn'+(idx===scoresWeekIdx?' active':'')+'" onclick="setScoresWeek('+idx+')">'+wk.week+'</button>';
  });
  navHtml += '</div>';

  const week = MATCHUPS[scoresWeekIdx];
  let matchesHtml = '';
  week.games.forEach((g, gi) => {
    const home = gt(g.home), away = gt(g.away);
    if (!home || !away) return;
    const hw  = g.homeScore > g.awayScore && g.homeScore > 0;
    const aw  = g.awayScore > g.homeScore && g.awayScore > 0;
    const mid = scoresWeekIdx * 100 + gi;

    const lineupHtml = (lineup, teamId) => {
      const t = gt(teamId);
      const starters = SLOT_ORDER.slice(0,7).map((slot, si) => {
        const name  = lineup[si] || '&mdash;';
        const score = g.playerScores[name] !== undefined ? g.playerScores[name].toFixed(1) : '&mdash;';
        return '<div class="me-player-row"><span class="me-slot">'+SLOT_LABELS[slot]+'</span><div><div class="me-pname">'+name+'</div></div><span class="me-ppts">'+score+'</span></div>';
      }).join('');
      const bench = SLOT_ORDER.slice(7).map((slot, si) => {
        const name  = lineup[7+si] || '&mdash;';
        const score = g.playerScores[name] !== undefined ? g.playerScores[name].toFixed(1) : '&mdash;';
        return '<div class="me-player-row bench"><span class="me-slot">BN</span><div><div class="me-pname">'+name+'</div></div><span class="me-ppts">'+score+'</span></div>';
      }).join('');
      return '<div class="me-lineup"><div class="me-lineup-title" style="color:'+(t?t.color:'var(--accent)')+'">'+( t?t.name:'Team')+'</div>'+starters+'<div class="me-bench-divider">&#9472; Bench</div>'+bench+'</div>';
    };

    matchesHtml += '<div class="matchup-expanded">'
      +'<div class="me-header">'
      +'<div class="me-team">'+teamLogoCell(home)+'<div><div class="me-tname">'+home.name+'</div><div class="me-owner">'+home.owner+'</div></div></div>'
      +'<div><div class="me-scores">'
      +'<div class="me-score '+(hw?'win':'lose')+'">'+g.homeScore.toFixed(1)+'</div>'
      +'<div class="me-sep">&ndash;</div>'
      +'<div class="me-score '+(aw?'win':'lose')+'">'+g.awayScore.toFixed(1)+'</div>'
      +'</div></div>'
      +'<div class="me-team r"><div><div class="me-tname">'+away.name+'</div><div class="me-owner">'+away.owner+'</div></div>'+teamLogoCell(away)+'</div>'
      +'</div>'
      +'<div class="expand-toggle" id="lt'+mid+'" onclick="toggleLineup('+mid+')">'
      +'<span>View Lineups &amp; Player Scores</span><span class="earrow">&#9660;</span></div>'
      +'<div class="lineup-panel" id="lp'+mid+'"><div class="me-lineups">'
      +lineupHtml(g.homeLineup||[], g.home)
      +lineupHtml(g.awayLineup||[], g.away)
      +'</div></div></div>';
  });

  document.getElementById('scores').innerHTML =
    '<div class="sec-header"><div><div class="sec-title">MATCH<span>UPS</span></div>'
    +'<div class="sec-desc">2026 Season &middot; Select any week to view scores &amp; lineups</div></div></div>'
    + navHtml + matchesHtml;
}

function setScoresWeek(idx) { scoresWeekIdx = idx; renderScores(); }

// ═══════════════════════════════════════════════════════════════
let stSort = { col:'rank', dir:1 };

function renderStandings() {
  const data = [...TEAMS].map(t=>({...t,diff:t.pf-t.pa})).sort((a,b)=>{
    const {col,dir}=stSort;
    if(col==='rank')  return dir*(b.wins-a.wins||(b.pf-b.pa)-(a.pf-a.pa));
    if(col==='team')  return dir*a.name.localeCompare(b.name);
    if(col==='owner') return dir*a.owner.localeCompare(b.owner);
    if(col==='streak')return dir*(a.streak-b.streak);
    return dir*(a[col]-b[col]);
  });
  const NUMERIC_COLS = ['wins','losses','pf','pa','diff','streak','rank'];
  const th=(col,lbl)=>{
    const act=stSort.col===col?' sorted':'';
    const icon=stSort.col===col?(stSort.dir===1?'&#8595;':'&#8593;'):'&#8597;';
    const isNum=NUMERIC_COLS.includes(col);
    const style=isNum?' style="text-align:right"':'';
    return '<th class="'+act+'" data-sort="'+col+'" onclick="sortSt(this.dataset.sort)"'+style+'>'+lbl+SH+icon+SE+'</th>';
  };
  let html='<div class="sec-header"><div><div class="sec-title">STAND<span>INGS</span></div>'
    +'<div class="sec-desc">Click any column to sort &middot; Top 8 teams advance to playoffs</div></div></div>'
    +'<div class="swrap"><table class="stbl"><thead><tr>'
    +'<th style="width:44px"></th>'+th('rank','#')+th('team','Team')+th('owner','Manager')
    +th('wins','W')+th('losses','L')+th('pf','PF')+th('pa','PA')+th('diff','DIFF')
    +'<th>WIN%</th>'+th('streak','STREAK')+'<th>STATUS</th>'
    +'</tr></thead><tbody>';

  data.forEach((t,i)=>{
    const seed = i+1, inPlayoffs = seed<=8, isElim = seed>8;
    let divider = '';
    if (seed===9) {
      divider = '<tr><td colspan="12" style="padding:0;height:0;border:none;">'
        +'<div style="display:flex;align-items:center;gap:0.75rem;padding:0.4rem 1rem;background:rgba(240,79,58,0.06);border-top:2px dashed rgba(240,79,58,0.4);border-bottom:1px solid rgba(240,79,58,0.2);">'
        +'<span style="font-family:Space Mono,monospace;font-size:0.58rem;color:var(--accent3);letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap">&#9660; Playoff Cutline</span>'
        +'<div style="flex:1;height:1px;background:rgba(240,79,58,0.2)"></div></div></td></tr>';
    }
    const rowStyle = isElim?'opacity:0.45;':'';
    const rankStyle = seed<=3?' t3':'';
    const statusCell = inPlayoffs
      ? '<td class="nm"><span style="font-family:Space Mono,monospace;font-size:0.62rem;letter-spacing:0.08em;padding:0.2rem 0.6rem;background:rgba(45,230,184,0.12);color:var(--accent2);border:1px solid rgba(45,230,184,0.3);white-space:nowrap">#'+seed+' SEED</span></td>'
      : '<td class="nm"><span style="font-family:Space Mono,monospace;font-size:0.62rem;letter-spacing:0.08em;padding:0.2rem 0.6rem;background:rgba(240,79,58,0.1);color:var(--accent3);border:1px solid rgba(240,79,58,0.25);white-space:nowrap">OUT</span></td>';
    html += divider
      +'<tr style="'+rowStyle+'">'
      +'<td style="padding:0.5rem 0.75rem">'+teamLogoCell(t)+'</td>'
      +'<td class="rc'+rankStyle+'">'+seed+'</td>'
      +'<td class="nc">'+t.name+'</td>'
      +'<td class="oc">'+t.owner+'</td>'
      +'<td class="nm wc">'+t.wins+'</td>'
      +'<td class="nm lc">'+t.losses+'</td>'
      +'<td class="nm pc">'+t.pf.toFixed(1)+'</td>'
      +'<td class="nm">'+t.pa.toFixed(1)+'</td>'
      +'<td class="nm" style="color:'+(t.diff>=0?'var(--accent2)':'var(--accent3)')+'">'+( t.diff>=0?'+':'')+t.diff.toFixed(1)+'</td>'
      +'<td class="nm"><div style="display:flex;align-items:center;gap:0.5rem;justify-content:flex-end"><div class="rbar"><div class="rbar-f" style="width:'+fillPct(t.wins,t.losses)+'%"></div></div>'+pct(t.wins,t.losses)+'</div></td>'
      +'<td class="nm" style="color:'+strkCol(t.streak)+'">'+strkStr(t.streak)+'</td>'
      +statusCell+'</tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('standings').innerHTML=html;
}

function sortSt(col){
  stSort.dir=stSort.col===col?stSort.dir*-1:(['rank','wins','pf'].includes(col)?-1:1);
  stSort.col=col; renderStandings();
}

let plSort    = { col:'pts', dir:-1 };
let plFilters = { search:'', pos:'', team:'', status:'' };

function renderPlayers() {
  const {search,pos,team,status}=plFilters;
  let data = PLAYERS.filter(p=>{
    if(search && !p.name.toLowerCase().includes(search) && !p.school.toLowerCase().includes(search)) return false;
    if(pos && p.pos!==pos) return false;
    if(team==='fa'){ if(!p.fa) return false; }
    else if(team && p.ft!==+team) return false;
    return true;
  }).sort((a,b)=>{
    const {col,dir}=plSort;
    if(col==='name')    return dir*a.name.localeCompare(b.name);
    if(col==='school')  return dir*a.school.localeCompare(b.school);
    if(col==='pos')     return dir*a.pos.localeCompare(b.pos);
    if(col==='team'){const an=a.fa?'ZZZZZ':gt(a.ft)?gt(a.ft).name:'';const bn=b.fa?'ZZZZZ':gt(b.ft)?gt(b.ft).name:'';return dir*an.localeCompare(bn);}
    if(col==='ptsPerSet'){const aps=a.sets>0?a.pts/a.sets:0,bps=b.sets>0?b.pts/b.sets:0;return dir*(aps-bps);}
    return dir*(a[col]-b[col]);
  });

  const PL_NUMERIC = ['pts','ptsPerSet','lastWk','kills','aces','blocks','digs','assists'];
  const th=(col,lbl)=>{
    const act=plSort.col===col?' sorted':'';
    const icon=plSort.col===col?(plSort.dir===1?'&#8595;':'&#8593;'):'&#8597;';
    const isNum=PL_NUMERIC.includes(col);
    const style=isNum?' style="text-align:right"':'';
    return '<th class="'+act+'" data-sort="'+col+'" onclick="sortPl(this.dataset.sort)"'+style+'>'+lbl+SH+icon+SE+'</th>';
  };

  const teamOpts=TEAMS.map(t=>'<option value="'+t.id+'"'+(plFilters.team==t.id?' selected':'')+'>'+t.name+'</option>').join('');
  const posOpts=['S','OH','MB','L','OPP'].map(p=>'<option value="'+p+'"'+(plFilters.pos===p?' selected':'')+'>'+p+'</option>').join('');

  let html='<div class="sec-header"><div><div class="sec-title">ALL <span>PLAYERS</span></div>'
    +'<div class="sec-desc">Click any player row to expand stats &middot; Use dropdown to filter Free Agents</div></div></div>'
    +'<div class="ctrl">'
    +'<input class="sbox" type="text" placeholder="Search player or school&hellip;" value="'+search+'" oninput="plFilters.search=this.value.toLowerCase();renderPlayers()">'
    +'<select class="fsel" onchange="plFilters.pos=this.value;renderPlayers()"><option value="">All Positions</option>'+posOpts+'</select>'
    +'<select class="fsel" onchange="onTeamFilter(this.value)"><option value="">All Teams</option><option value="fa"'+(plFilters.team==='fa'?' selected':'')+'>&#9733; Free Agents</option>'+teamOpts+'</select>'
    +'</div>'
    +'<div class="swrap"><table class="stbl"><thead><tr>'
    +'<th style="width:44px"></th><th>#</th>'
    +th('name','Player')+th('school','School')+th('pos','Pos')+th('team','Fantasy Team')
    +th('pts','FPTS')+th('ptsPerSet','FPTS/Set')+th('lastWk','Last Wk')
    +'<th style="width:28px"></th>'
    +'</tr></thead><tbody>';

  data.forEach((p,i)=>{
    const teamCell = p.fa ? faBadge() : '<span class="oc">'+(gt(p.ft)?gt(p.ft).name:'--')+'</span>';
    const lastWkColor = p.lastWk>0?'color:var(--accent2)':'';
    const rowId = 'prow-'+i;
    html+=
      '<tr class="player-main-row" data-rid="'+rowId+'" onclick="togglePlayerRow(this.dataset.rid)" style="cursor:pointer">'
      +'<td style="padding:0.5rem 0.75rem">'+playerPhotoCell(p)+'</td>'
      +'<td class="rc">'+(i+1)+'</td>'
      +'<td class="nc">'+p.name+'</td>'
      +'<td class="oc">'+p.school+'</td>'
      +'<td>'+pb(p.pos)+'</td>'
      +'<td>'+teamCell+'</td>'
      +'<td class="nm pc">'+p.pts.toFixed(1)+'</td>'
      +'<td class="nm" style="color:var(--muted)">'+(p.sets>0?(p.pts/p.sets).toFixed(1):'&mdash;')+'</td>'
      +'<td class="nm" style="'+lastWkColor+'">'+p.lastWk.toFixed(1)+'</td>'
      +'<td class="nm" style="color:var(--muted);font-size:0.7rem" id="arr-'+rowId+'">&#9660;</td>'
      +'</tr>'
      +'<tr class="player-expand-row" id="'+rowId+'" style="display:none">'
      +'<td colspan="10" style="padding:0;border-bottom:1px solid var(--border)">'
      +'<div class="player-stat-drawer">'
      +'<div class="psd-player-info">'
      +   '<div class="psd-player-photo">'+(p.photo?'<img src="'+p.photo+'" alt="">':p.name.split(' ').filter(Boolean).slice(0,2).map(function(w){return w[0].toUpperCase();}).join(''))+'</div>'
      +   '<div>'
      +     '<div class="psd-player-name">'+p.name+'</div>'
      +     '<div class="psd-player-meta">'+p.school+' &middot; '+p.pos+'</div>'
      +     '<div style="margin-top:0.35rem">'+pb(p.pos)+'</div>'
      +   '</div>'
      +'</div>'
      +'<div class="psd-divider"></div>'
      +'<div class="psd-stats">'
      +'<div class="psd-stat"><span class="psd-val">'+p.kills+'</span><span class="psd-lbl">Kills</span></div>'
      +'<div class="psd-stat"><span class="psd-val">'+p.hitPct+'</span><span class="psd-lbl">Hit %</span></div>'
      +'<div class="psd-stat"><span class="psd-val">'+p.aces+'</span><span class="psd-lbl">Aces</span></div>'
      +'<div class="psd-stat"><span class="psd-val">'+p.assists+'</span><span class="psd-lbl">Assists</span></div>'
      +'<div class="psd-stat"><span class="psd-val">'+p.digs+'</span><span class="psd-lbl">Digs</span></div>'
      +'<div class="psd-stat"><span class="psd-val">'+p.blocks+'</span><span class="psd-lbl">Blocks</span></div>'
      +'</div>'
      +'</div>'
      +'</td></tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('players').innerHTML=html;
}

function onTeamFilter(v){plFilters.team=v;plFilters.status=(v==="fa"?"fa":"");renderPlayers();}
function sortPl(col){
  plSort.dir=plSort.col===col?plSort.dir*-1:(['pts','ptsPerSet','lastWk'].includes(col)?-1:1);
  plSort.col=col; renderPlayers();
}

//  DRAFT TAB
// ═══════════════════════════════════════════════════════════════
let draftFilters = { pos:'', team:'' };

function renderDraft() {
  const {pos,team}=draftFilters;
  const ROUNDS=10, SLOTS=10;
  const order=TEAMS.map(t=>t.id);
  const colW='50px '+order.map(()=>'1fr').join(' ');
  const teamOpts=TEAMS.map(t=>'<option value="'+t.id+'"'+(draftFilters.team==t.id?' selected':'')+'>'+t.name+'</option>').join('');
  const posOpts=['S','OH','MB','L','OPP'].map(p=>'<option value="'+p+'"'+(draftFilters.pos===p?' selected':'')+'>'+p+'</option>').join('');

  let html='<div class="sec-header"><div><div class="sec-title">DRAFT <span>BOARD</span></div>'
    +'<div class="sec-desc">Snake draft &middot; '+ROUNDS+' rounds &middot; '+SLOTS+' teams &middot; Pre-season 2026</div></div></div>'
    +'<div class="ctrl">'
    +'<select class="fsel" onchange="draftFilters.pos=this.value;renderDraft()"><option value="">All Positions</option>'+posOpts+'</select>'
    +'<select class="fsel" onchange="draftFilters.team=this.value;renderDraft()"><option value="">All Teams</option>'+teamOpts+'</select>'
    +'</div><div class="dgwrap"><div class="dg">'
    +'<div class="dhr" style="grid-template-columns:'+colW+'"><div class="dhc">RD</div>'
    +order.map(tid=>{const t=gt(tid)||{};return '<div class="dhc" style="border-top:3px solid '+(t.color||'#4db8f0')+'">'+( t.name||'').split(' ')[0]+'<br><span style="font-size:0.48rem;color:var(--muted)">'+(t.owner||'').split(' ')[0]+'</span></div>';}).join('')
    +'</div>';

  for(let r=1;r<=ROUNDS;r++){
    const snake=r%2===0;
    html+='<div class="drr" style="grid-template-columns:'+colW+'"><div class="drl">'+r+'</div>';
    for(let s=1;s<=SLOTS;s++){
      const ms  = snake?SLOTS-s+1:s;
      const tid = order[ms-1];
      const pick= DRAFT_PICKS.find(p=>p.r===r&&p.t===tid);
      const pnum=(r-1)*SLOTS+(snake?SLOTS-s+1:s);
      const dim =(pos&&pick&&pick.pos!==pos)||(team&&tid!==+team);
      html+='<div class="dp'+(snake?' ss':'')+'" style="'+(dim?'opacity:0.1;':'')+'">'
        +'<div class="dp-num">#'+pnum+'</div>'
        +(pick?'<div class="dp-name">'+pick.name+'</div><div class="dp-school">'+pick.school+'</div><div style="margin-top:2px">'+pb(pick.pos)+'</div>'
              :'<div class="dp-school" style="color:var(--muted)">--</div>')
        +'</div>';
    }
    html+='</div>';
  }
  html+='</div></div></div>';
  document.getElementById('draft').innerHTML=html;
}

function logoHtml(t){
  if(!t) return '<div class="blogo">?</div>';
  if(t.photo) return '<div class="blogo"><img src="'+t.photo+'" style="width:100%;height:100%;object-fit:cover" alt=""></div>';
  return '<div class="blogo" style="background:'+t.color+'22;border-color:'+t.color+'44;color:'+t.color+';font-family:Bebas Neue,sans-serif;font-size:0.7rem;letter-spacing:0.04em">'+initials(t.name)+'</div>';
}

function bteamHtml(entry,winner){
  if(!entry) return '<div class="bteam tbd"><div class="blogo" style="opacity:0.2">?</div><div class="binfo"><span class="bseed">TBD</span><span class="bname">TBD</span></div><span class="bscore">&mdash;</span></div>';
  const t=gt(entry.tid);
  const isW=winner!==null&&winner===entry.seed;
  const cls=winner===null?'':(isW?' win':' out');
  return '<div class="bteam'+cls+'">'+logoHtml(t)+'<div class="binfo"><span class="bseed">Seed '+entry.seed+'</span><span class="bname">'+(t?t.name:'TBD')+'</span><span class="bowner">'+(t?t.owner:'')+'</span></div>'+(entry.bye?'<span class="bye-tag">BYE</span>':'')+'<span class="bscore'+(isW?' win':'')+'">'+( entry.score>0?entry.score.toFixed(1):'&mdash;')+'</span></div>';
}

function matchHtml(m,isChamp){
  const cls=isChamp&&m.winner?' champ':'';
  const lbl=m.label?'<div class="bmatch-label">'+m.label+'</div>':'';
  const banner=isChamp&&m.winner?'<div class="champ-banner">&#127942;&nbsp; 2026 CHAMPION</div>':'';
  return '<div class="bmatch'+cls+'">'+banner+lbl+bteamHtml(m.teamA,m.winner)+bteamHtml(m.teamB,m.winner)+'</div>';
}

function renderPlayoffs(){
  let html='<div class="sec-header"><div><div class="sec-title">PLAYOFF <span>BRACKET</span></div>'
    +'<div class="sec-desc">Top 8 teams qualify &middot; Quarterfinals Wk 10 &middot; Semifinals Wk 11 &middot; Championship Wk 12</div></div></div>';
  html+='<div class="pdivider">Quarterfinals &mdash; Week 10 &mdash; Seeds 1&ndash;8</div>'
    +'<div class="bracket-outer"><div class="bracket-layout"><div class="bracket-col"><div class="bcol-label">Quarterfinals (Wk 10)</div><div class="bcol-games">'
    +(PLAYOFF.qf||[]).map(m=>matchHtml(m,false)).join('')+'</div></div></div></div>';
  html+='<div class="pdivider">Semifinals &mdash; Week 11</div>'
    +'<div class="bracket-outer"><div class="bracket-layout"><div class="bracket-col"><div class="bcol-label">Semifinals (Wk 11)</div><div class="bcol-games">'
    +(PLAYOFF.sf||[]).map(m=>matchHtml(m,false)).join('')+'</div></div></div></div>';
  const fin=PLAYOFF.final||{};
  html+='<div class="pdivider">Championship &mdash; Week 12</div>'
    +'<div class="bracket-outer"><div class="bracket-layout"><div class="bracket-col" style="max-width:320px"><div class="bcol-label">Championship (Wk 12)</div><div class="bcol-games">'
    +matchHtml({...fin,label:''},true)+'</div></div></div></div>';
  document.getElementById('playoffs').innerHTML=html;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════════════════════════════
function renderAll() {
  renderTeams();
  renderScores();
  renderStandings();
  renderPlayers();
  renderDraft();
  renderPlayoffs();
}

// ═══════════════════════════════════════════════════════════════
//  INIT — load from Google Sheets
// ═══════════════════════════════════════════════════════════════
loadAllData();
</script>
